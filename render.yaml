# Render Blueprint - Organoid Symbiont
# Background worker + health web service + daily cron
# Node.js/TypeScript project

services:
  # Background Worker: 24/7 mention poller
  - type: worker
    name: embodiments-worker
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: |
      echo "Installing Node.js dependencies..."
      pnpm install --frozen-lockfile --prod=false
      echo "Building TypeScript..."
      pnpm build
      echo "Build complete. Output:"
      ls -la dist/
    preDeployCommand: pnpm run deploy-check
    startCommand: node dist/index.js
    disk:
      name: xai-bot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      # Infrastructure
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data

      # State Storage (Redis)
      - key: USE_REDIS
        value: "true"
      - key: KV_URL
        sync: false # Set in Render dashboard: redis://default:PASS@HOST.upstash.io:6379
      - key: REDIS_KEY_PREFIX
        value: "ORGANOID:"

      # X OAuth2 (sensitive - set in dashboard or Environment Group)
      - key: X_CLIENT_ID
        sync: false
      - key: X_CLIENT_SECRET
        sync: false
      - key: X_REFRESH_TOKEN
        sync: false
      - key: X_ACCESS_TOKEN
        sync: false
      - key: X_REFRESH_BUFFER_SECONDS
        value: "300"
      - key: X_OAUTH_TOKEN_URL
        value: https://api.x.com/2/oauth2/token

      # LLM Provider (xAI)
      - key: LLM_PROVIDER
        value: xai
      - key: XAI_API_KEY
        sync: false
      - key: XAI_BASE_URL
        value: https://api.x.ai/v1
      - key: XAI_MODEL_PRIMARY
        value: grok-3
      - key: XAI_MODEL_FALLBACKS
        value: grok-3-mini

      # Bot Configuration
      - key: BOT_USERNAME
        value: organoid_on_sol
      - key: LAUNCH_MODE
        value: prod
      - key: BOT_ACTIVATION_MODE
        value: global
      - key: EMBODIMENT_ORCHESTRATION_ENABLED
        value: "false"

      # Polling
      - key: POLL_INTERVAL_MS
        value: "30000"
      - key: MENTIONS_SOURCE
        value: search

      # Logging
      - key: LOG_LEVEL
        value: INFO

  # Optional: Health/Metrics Web Service
  - type: web
    name: embodiments-health
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm build
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: LOG_LEVEL
        value: INFO
      - key: USE_REDIS
        value: "true"
      - key: KV_URL
        sync: false

  # Daily Embodiment Snippet Extractor - Cron (täglich 3 Uhr UTC)
  - type: cron
    name: embodiments-daily-snippets
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm build
    startCommand: pnpm exec tsx src/embodiment/dailySnippetExtractor.ts
    schedule: "0 3 * * *"
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_REDIS
        value: "true"
      - key: KV_URL
        sync: false
      - key: XAI_API_KEY
        sync: false
