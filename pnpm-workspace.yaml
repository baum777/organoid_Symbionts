packages:
  - "."
  - "apps/*"

# pnpm 11 replaced `onlyBuiltDependencies` with `allowBuilds`. The four
# packages below are native modules that need their install scripts to
# run. Without this, `pnpm install` (and `pnpm --filter landing typecheck`,
# which pre-flights install) fails with `ERR_PNPM_IGNORED_BUILDS`.
allowBuilds:
  bufferutil: true
  esbuild: true
  sharp: true
  utf-8-validate: true
